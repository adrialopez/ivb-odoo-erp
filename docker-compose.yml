services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER:-odoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-odoo}
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo:
    image: odoo:19.0
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: ${DB_USER:-odoo}
      PASSWORD: ${DB_PASSWORD:-odoo}
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./scripts/bootstrap.sh:/bootstrap.sh
    # bootstrap.sh instala los módulos base de un distribuidor (sin
    # fabricación) + el conector de IVB, aplica la localización española
    # (país + plan contable PYMES) y el idioma, y luego arranca el
    # servidor. Ver el propio script para el porqué no es un post_init_hook.
    command: bash /bootstrap.sh

volumes:
  odoo-db-data:
  odoo-web-data:
